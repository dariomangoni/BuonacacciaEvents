name: Update All Reports

on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch: # Permette l'avvio manuale per test

permissions:
  pages: write
  id-token: write

jobs:
  build_and_run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests beautifulsoup4 pandas

      - name: Run Scrapers
        run: |
          python extract_events.py PiccoleOrme
          python extract_events.py Competenza
          python extract_events.py Special

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Carica l'intero repository (root) come sito da pubblicare
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
